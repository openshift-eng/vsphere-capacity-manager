name: test
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Run Tests
        run: "make test"

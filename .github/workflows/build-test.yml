name: build 

on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  image:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - name: image
      uses: redhat-actions/buildah-build@v2
      id: build-image
      with:
        image: test
        tags: latest ${{ github.sha }}
        containerfiles: |
          ./Containerfile      
